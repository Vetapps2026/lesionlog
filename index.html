<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LesionLog">
<meta name="theme-color" content="#0D7A6B">
<title>LesionLog</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --teal:   #0D7A6B;
  --teal-d: #063D35;
  --teal-l: #E6F4F2;
  --teal-m: #C2E8E2;
  --ink:    #1A2B2A;
  --ink-s:  #3D5452;
  --ink-f:  #6B8280;
  --paper:  #FFFFFF;
  --sunk:   #F4F9F8;
  --line:   #D4E6E3;
  --danger: #a32d2d;
  --danger-soft: #fcebeb;
  --font:   -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--sunk);font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;}
#root{height:100%;display:flex;flex-direction:column;}

/* ── Topbar ── */
.topbar{
  background:var(--teal-d);
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.topbar-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 6px 0 0;line-height:1;}
.topbar-logo{background:rgba(255,255,255,.15);font-family:monospace;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 7px;border-radius:5px;color:#fff;}
.topbar-title{font-size:17px;font-weight:700;color:#fff;flex:1;}
.topbar-action{background:none;border:none;color:#C2E8E2;font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:6px;}
.topbar-action:active{background:rgba(255,255,255,.1);}

/* ── Bottom nav ── */
.bottom-nav{
  background:var(--teal-d);
  border-top:1px solid rgba(255,255,255,.1);
  display:flex;
  padding-bottom:var(--safe-bot);
  flex-shrink:0;
}
.nav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,.5);font-size:10px;font-weight:600;cursor:pointer;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font);}
.nav-btn .icon{font-size:20px;line-height:1;}
.nav-btn.active{color:#fff;}
.nav-btn.active .icon{transform:scale(1.1);}

/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── Scroll content ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── Cards ── */
.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;margin:12px 14px;overflow:hidden;}
.card-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--line);}
.card-row:last-child{border-bottom:none;}
.card-row-icon{font-size:26px;flex-shrink:0;}
.card-row-text{flex:1;min-width:0;}
.card-row-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-row-sub{font-size:12px;color:var(--ink-f);margin-top:2px;}
.card-row-right{color:var(--ink-f);font-size:20px;flex-shrink:0;}

/* ── Section header ── */
.section-hdr{padding:18px 14px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-f);}

/* ── Empty state ── */
.empty{text-align:center;padding:52px 24px;color:var(--ink-f);line-height:1.7;}
.empty .icon{font-size:44px;display:block;margin-bottom:12px;}
.empty strong{color:var(--ink-s);}

/* ── Buttons ── */
.btn{border:1px solid var(--line);background:var(--paper);border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-danger{background:var(--danger-soft);border-color:var(--danger);color:var(--danger);}
.btn-full{width:100%;justify-content:center;}
.btn:active{opacity:.8;}
.fab{position:fixed;bottom:calc(72px + var(--safe-bot));right:18px;width:54px;height:54px;border-radius:27px;background:var(--teal);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(13,122,107,.4);display:flex;align-items:center;justify-content:center;z-index:10;}

/* ── Forms ── */
.form-body{padding:16px 14px;display:flex;flex-direction:column;gap:14px;}
.field label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-s);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:15px;font-family:var(--font);color:var(--ink);background:var(--sunk);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);background:#fff;}
.form-error{background:var(--danger-soft);color:var(--danger);font-size:13px;padding:10px 12px;border-radius:8px;}
.form-actions{display:flex;gap:10px;padding:0 14px 24px;}

/* ── Sheet (bottom modal) ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;}
.sheet-backdrop.open{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:101;max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-size:17px;font-weight:700;padding:14px 18px 10px;border-bottom:1px solid var(--line);}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:var(--safe-bot);}

/* ── Patient detail ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 14px 0;}
.detail-field label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-f);display:block;margin-bottom:3px;}
.detail-field .val{font-size:14.5px;color:var(--ink);}

/* ── Map card ── */
.map-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;margin:8px 14px;padding:13px 14px;display:flex;align-items:center;gap:12px;}
.map-card-info{flex:1;min-width:0;}
.map-card-date{font-size:14px;font-weight:600;}
.map-card-meta{font-size:12px;color:var(--ink-f);margin-top:2px;}
.map-card-arrow{color:var(--ink-f);font-size:18px;}

/* ── Mapper wrapper ── */
#mapper-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--sunk);}
#mapper-wrap #app{max-width:100%;}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;}

/* ── Settings ── */
.settings-section{margin-bottom:8px;}
.settings-row{background:var(--paper);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.settings-row:first-child{border-radius:12px 12px 0 0;}
.settings-row:last-child{border-bottom:none;border-radius:0 0 12px 12px;}
.settings-row:only-child{border-radius:12px;border-bottom:none;}
.settings-label{font-size:15px;color:var(--ink);}
.settings-value{font-size:13px;color:var(--ink-f);}

/* ── Login ── */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--teal-d);}
.login-logo{background:rgba(255,255,255,.15);font-family:monospace;font-size:14px;font-weight:700;letter-spacing:.1em;padding:8px 16px;border-radius:10px;color:#fff;margin-bottom:16px;}
.login-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px;}
.login-sub{font-size:14px;color:var(--teal-m);margin-bottom:32px;}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;}
.login-card .field{margin-bottom:14px;}

#mapper-wrap { height: 100%; overflow: hidden; }
</style>
</head>

<script>
'use strict';

// ── Supabase sync for LesionLog ───────────────────────────────────────────────
// Works in both PWA (browser) and Electron (Node.js via fetch)
// Uses the Supabase REST API directly — no SDK needed

const SUPABASE_URL = 'https://sqarjflzicjeqhzzprfx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KYFtfG7U3TxX0dqXrHKfBg_S_6IC9JA';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'resolution=merge-duplicates',
};

// ── Low-level REST helpers ────────────────────────────────────────────────────
async function sbSelect(table, filter = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${filter}&order=updated_at.asc`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Supabase select ${table} failed: ${res.status}`);
  return res.json();
}

async function sbUpsert(table, rows) {
  if (!rows || rows.length === 0) return [];
  const url = `${SUPABASE_URL}/rest/v1/${table}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(rows),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Supabase upsert ${table} failed: ${res.status} ${txt}`);
  }
  return res.json();
}

// ── Sync logic ────────────────────────────────────────────────────────────────
// Strategy: "last write wins" based on updated_at timestamp
// Both local and remote rows are upserted — newest timestamp wins

async function syncAll(localData, onProgress) {
  const log = onProgress || (() => {});

  log('Connecting to cloud…');

  // ── 1. Push local clinic ──────────────────────────────────────────────────
  if (localData.clinic) {
    log('Syncing clinic settings…');
    await sbUpsert('clinic', [{
      id:          localData.clinic.sync_id || generateUUID(),
      name:        localData.clinic.name || '',
      license_key: localData.clinic.license_key || '',
    }]);
  }

  // ── 2. Push local vets ────────────────────────────────────────────────────
  log('Syncing vet accounts…');
  const localVets = (localData.vets || []).map(v => ({
    id:         v.sync_id || generateUUID(),
    name:       v.name,
    email:      v.email,
    pw_hash:    v.pw_hash,
    role:       v.role || 'vet',
    updated_at: v.updated_at || new Date().toISOString(),
  }));
  if (localVets.length > 0) await sbUpsert('vets', localVets);

  // ── 3. Push local patients ────────────────────────────────────────────────
  log('Syncing patients…');
  const localPatients = (localData.patients || []).map(p => ({
    id:          p.sync_id || generateUUID(),
    name:        p.name,
    species:     p.species,
    breed:       p.breed || null,
    owner_name:  p.owner_name || null,
    patient_id:  p.patient_id || null,
    dob:         p.dob || null,
    sex:         p.sex || null,
    notes:       p.notes || null,
    updated_at:  p.updated_at || new Date().toISOString(),
    created_at:  p.created_at || new Date().toISOString(),
  }));
  if (localPatients.length > 0) await sbUpsert('patients', localPatients);

  // ── 4. Push local maps ────────────────────────────────────────────────────
  log('Syncing lesion maps…');
  const localMaps = (localData.maps || []).map(m => ({
    id:         m.sync_id || generateUUID(),
    patient_id: m.patient_sync_id || m.patient_id,
    vet_name:   m.vet_name || '',
    exam_date:  m.exam_date,
    species:    m.species,
    view:       m.view,
    lesions:    m.lesions || [],
    notes:      m.notes || '',
    updated_at: m.updated_at || new Date().toISOString(),
    created_at: m.created_at || new Date().toISOString(),
  }));
  if (localMaps.length > 0) await sbUpsert('lesion_maps', localMaps);

  // ── 5. Pull all remote data ───────────────────────────────────────────────
  log('Downloading from cloud…');
  const [remoteVets, remotePatients, remoteMaps] = await Promise.all([
    sbSelect('vets'),
    sbSelect('patients', 'deleted_at=is.null'),
    sbSelect('lesion_maps', 'deleted_at=is.null'),
  ]);

  log('Sync complete ✓');

  return {
    vets:     remoteVets,
    patients: remotePatients,
    maps:     remoteMaps,
  };
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// Export for both browser (PWA) and Node.js (Electron)
window.LesionLogSync = { syncAll, generateUUID, SUPABASE_URL, SUPABASE_KEY };

// ── SVG helper functions ─────────────────────────────────────────────────────
function jointMarker(cx, cy, kind){
  return `<circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="#5b6670" stroke-width="1.3" stroke-dasharray="2.5,2" opacity="0.55"/>`;
}
// legLabel draws a small circular badge with R/L text directly on a leg.
function legLabel(cx, cy, side){
  const bg = side === 'R' ? '#cfe7ff' : '#ffe2cf';
  const fg = side === 'R' ? '#0b4f8a' : '#9a4b0b';
  return `<g><circle cx="${cx}" cy="${cy}" r="9" fill="${bg}" stroke="#ffffff" stroke-width="1.5"/><text x="${cx}" y="${cy+3.5}" text-anchor="middle" font-size="10" font-weight="700" fill="${fg}" font-family="Arial, sans-serif">${side}</text></g>`;
}

const VIEW_LABELS = {
  lateral_right: 'Right lateral',
  lateral_left:  'Left lateral',
  dorsal:        'Dorsal',
  ventral:       'Ventral',
  caudal:        'Caudal',
};

// ── Mapper state ──────────────────────────────────────────────────────────────
let mapperState = {
  species: 'dog',
  view: 'lateral_right',
  lesions: [],
  nextNum: 1,
  patient: { name: '', id: '', vet: '', date: '' },
  editing: null, // lesion being edited
};

let mapperContainer = null; // DOM element to render into
let mapperSaveCallback = null;

// ── Init ──────────────────────────────────────────────────────────────────────
function initPWAMapper(container, initState, onSave) {
  mapperContainer = container;
  if (initState) {
    mapperState.species = initState.species || 'dog';
    mapperState.view    = initState.view    || 'lateral_right';
    mapperState.lesions = initState.lesions ? [...initState.lesions] : [];
    mapperState.nextNum = initState.nextNum || 1;
    if (initState.patient) Object.assign(mapperState.patient, initState.patient);
  }
  mapperSaveCallback = onSave || null;
  renderPWAMapper();
}

function getMapperState() {
  return {
    species: mapperState.species,
    view:    mapperState.view,
    lesions: [...mapperState.lesions],
    nextNum: mapperState.nextNum,
    patient: { ...mapperState.patient },
  };
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPWAMapper() {
  if (!mapperContainer) return;

  const svg = MAPPER_DIAGRAMS[mapperState.species][mapperState.view];
  const viewLesions = mapperState.lesions.filter(l => l.view === mapperState.view);

  mapperContainer.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;background:#f4f6f7;">

      <!-- Species + View tabs -->
      <div style="background:#fff;border-bottom:1px solid #D4E6E3;padding:10px 14px;flex-shrink:0;">
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          ${['dog','cat'].map(sp => `
            <button onclick="setMapperSpecies('${sp}')"
              style="flex:1;padding:7px;border-radius:7px;border:1.5px solid ${mapperState.species===sp?'#0D7A6B':'#D4E6E3'};
                     background:${mapperState.species===sp?'#E6F4F2':'#fff'};font-size:13px;font-weight:600;
                     color:${mapperState.species===sp?'#0D7A6B':'#6B8280'};cursor:pointer;">
              ${sp==='dog'?'Dog':'Cat'}
            </button>
          `).join('')}
        </div>
        <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;">
          ${Object.keys(VIEW_LABELS).map(v => `
            <button onclick="setMapperView('${v}')"
              style="flex-shrink:0;padding:5px 10px;border-radius:6px;border:1.5px solid ${mapperState.view===v?'#0D7A6B':'#D4E6E3'};
                     background:${mapperState.view===v?'#0D7A6B':'#fff'};font-size:11px;font-weight:600;
                     color:${mapperState.view===v?'#fff':'#6B8280'};cursor:pointer;white-space:nowrap;">
              ${VIEW_LABELS[v]}
            </button>
          `).join('')}
        </div>
      </div>

      <!-- Diagram -->
      <div style="flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px;">
        <div style="background:#fff;border-radius:10px;border:1px solid #D4E6E3;overflow:hidden;position:relative;"
             id="mapper-stage" onclick="handleMapperClick(event)">
          <div style="padding:6px 12px;font-size:12px;font-weight:600;color:#6B8280;border-bottom:1px solid #f0f0f0;">
            ${mapperState.species==='dog'?'Dog':'Cat'} &middot; ${VIEW_LABELS[mapperState.view]}
            <span style="float:right;color:#0D7A6B;">${viewLesions.length} marked &bull; tap diagram to add</span>
          </div>
          <div style="position:relative;user-select:none;" id="diagram-wrap">
            ${svg}
            ${viewLesions.map(l => `
              <div onclick="editLesion(${l.num},event)"
                style="position:absolute;left:calc(${l.x}% - 14px);top:calc(${l.y}% - 14px);
                       width:28px;height:28px;border-radius:50%;background:${l.color};
                       display:flex;align-items:center;justify-content:center;
                       color:#fff;font-size:11px;font-weight:700;cursor:pointer;
                       box-shadow:0 2px 6px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.7);
                       z-index:10;">
                ${l.num}

// ── Interactions ──────────────────────────────────────────────────────────────
let _pendingClick = null;

function handleMapperClick(event) {
  const stage = document.getElementById('mapper-stage');
  const wrap = document.getElementById('diagram-wrap');
  if (!stage || !wrap) return;

  // Don't register clicks on pins or buttons
  if (event.target.closest('button') || event.target.tagName === 'BUTTON') return;
  // Only register on the SVG or diagram-wrap itself
  if (!event.target.closest('#diagram-wrap') && event.target.id !== 'mapper-stage') return;

  const rect = wrap.getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 100;
  const y = ((event.clientY - rect.top) / rect.height) * 100;

  if (x < 0 || x > 100 || y < 0 || y > 100) return;

  _pendingClick = { x: +x.toFixed(2), y: +y.toFixed(2) };
  openLesionPicker();
}

function openLesionPicker() {
  const picker = document.getElementById('lesion-picker');
  const list = document.getElementById('lesion-type-list');
  if (!picker || !list) return;

  list.innerHTML = LESION_TYPES.map(lt => `
    <button onclick="selectLesionType('${lt.id}','${lt.label}','${lt.color}')"
      style="padding:10px 8px;border:1.5px solid #D4E6E3;border-radius:8px;background:#fff;
             display:flex;align-items:center;gap:8px;cursor:pointer;text-align:left;">
      <span style="width:14px;height:14px;border-radius:50%;background:${lt.color};flex-shrink:0;"></span>
      <span style="font-size:12px;font-weight:600;color:#1A2B2A;">${lt.label}</span>
    </button>
  `).join('');

  picker.style.display = 'flex';
}

function closeLesionPicker() {
  const picker = document.getElementById('lesion-picker');
  if (picker) picker.style.display = 'none';
  _pendingClick = null;
}

function selectLesionType(id, label, color) {
  closeLesionPicker();
  if (!_pendingClick) return;

  const note = ''; // Could add a note prompt here later
  mapperState.lesions.push({
    num:   mapperState.nextNum++,
    view:  mapperState.view,
    x:     _pendingClick.x,
    y:     _pendingClick.y,
    type:  id,
    label: label,
    color: color,
    note:  note,
  });
  _pendingClick = null;
  renderPWAMapper();
}

function editLesion(num, event) {
  event.stopPropagation();
  const lesion = mapperState.lesions.find(l => l.num === num);
  if (!lesion) return;
  const note = prompt('Note for this lesion (optional):', lesion.note || '');
  if (note !== null) {
    lesion.note = note;
    renderPWAMapper();
  }
}

function deleteLesion(num, event) {
  event.stopPropagation();
  if (!confirm('Remove this lesion marker?')) return;
  mapperState.lesions = mapperState.lesions.filter(l => l.num !== num);
  renderPWAMapper();
}

function setMapperSpecies(sp) {
  mapperState.species = sp;
  renderPWAMapper();
}

function setMapperView(v) {
  mapperState.view = v;
  renderPWAMapper();
}


// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB_NAME = 'lesionlog';
const DB_VER  = 1;
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) { resolve(_db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      // Settings
      if (!db.objectStoreNames.contains('settings')) {
        db.createObjectStore('settings', { keyPath: 'key' });
      }
      // Vets
      if (!db.objectStoreNames.contains('vets')) {
        db.createObjectStore('vets', { keyPath: 'id', autoIncrement: true });
      }
      // Patients
      if (!db.objectStoreNames.contains('patients')) {
        const ps = db.createObjectStore('patients', { keyPath: 'id', autoIncrement: true });
        ps.createIndex('updated_at', 'updated_at');
      }
      // Lesion maps
      if (!db.objectStoreNames.contains('maps')) {
        const ms = db.createObjectStore('maps', { keyPath: 'id', autoIncrement: true });
        ms.createIndex('patient_id', 'patient_id');
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror  = () => reject(req.error);
  });
}

function dbGet(store, key) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}

function dbGetAll(store, indexName, keyRange) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const os = tx.objectStore(store);
    const req = indexName ? os.index(indexName).getAll(keyRange) : os.getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  }));
}

function dbPut(store, obj) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}

function dbDelete(store, key) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  }));
}

// Simple password hash
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'vlm-pwa-2026'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doSetup() {
  const clinic = $('s-clinic').value.trim();
  const name   = $('s-name').value.trim();
  const email  = $('s-email').value.trim();
  const pw     = $('s-pw').value;
  const pw2    = $('s-pw2').value;
  const err    = $('s-err');
  err.style.display = 'none';

  if (!clinic || !name || !email || !pw) { err.textContent='All fields required.'; err.style.display='block'; return; }
  if (pw.length < 8) { err.textContent='Password must be at least 8 characters.'; err.style.display='block'; return; }
  if (pw !== pw2) { err.textContent='Passwords do not match.'; err.style.display='block'; return; }

  const hash = await hashPw(pw);
  await dbPut('settings', { key: 'clinic', name: clinic });
  await dbPut('vets', { name, email: email.toLowerCase(), pw_hash: hash, role: 'admin', created_at: now() });

  App.clinic = { name: clinic };
  App.vet = { name, email: email.toLowerCase(), role: 'admin' };
  App.screen = 'app';
  App.tab = 'patients';
  render();
}

async function doLogin() {
  const email = $('l-email').value.trim().toLowerCase();
  const pw    = $('l-pw').value;
  const err   = $('l-err');
  err.style.display = 'none';
  if (!email || !pw) { err.textContent='Please enter email and password.'; err.style.display='block'; return; }

  const vets = await dbGetAll('vets');
  const vet  = vets.find(v => v.email === email);

  App.vet = vet;
  App.screen = 'app';
  App.tab = 'patients';
  render();

    breed:       $('pf-breed').value.trim(),
    owner_name:  $('pf-owner').value.trim(),
    patient_id:  $('pf-pid').value.trim(),
    dob:         $('pf-dob').value,
    sex:         $('pf-sex').value,
    notes:       $('pf-notes').value.trim(),
    updated_at:  now(),
  };
  if (id !== null && id !== 'null') {
    data.id = id;
    data.created_at = (await dbGet('patients', id))?.created_at || now();
  } else {
    data.created_at = now();
  }

  const newId = await dbPut('patients', data);
  closeSheet();
  const patients = await dbGetAll('patients');
  App.patient = patients.find(p => p.id === (id||newId)) || null;
  renderTab();
  toast(id ? 'Patient updated ✓' : 'Patient created ✓');
}

async function deletePatient(id) {
  if (!confirm('Delete this patient and all their lesion maps? This cannot be undone.')) return;
  await dbDelete('patients', id);
  const allMaps = await dbGetAll('maps', 'patient_id', IDBKeyRange.only(id));
  await Promise.all(allMaps.map(m => dbDelete('maps', m.id)));
  App.patient = null;
  renderTab();
  toast('Patient deleted');
}

          <div style="margin-top:24px;">
            <button class="btn btn-primary" onclick="switchTab('patients')">Go to Patients</button>
          </div>

    try {
      initPWAMapper(wrap, {
        species: mr.isNew
          ? (patient?.species === 'Feline' ? 'cat' : 'dog')
          : (mr.species === 'Feline' ? 'cat' : 'dog'),
        view:    mr.isNew ? 'lateral_right' : (mr.view || 'lateral_right'),
        lesions: mr.isNew ? [] : (mr.lesions || []),
        nextNum: mr.isNew ? 1 : Math.max(1, ...(mr.lesions||[]).map(l=>l.num||0)) + 1,
        patient: {
          name: patient?.owner_name || patient?.name || '',
          id:   patient?.patient_id || '',
          vet:  App.vet?.name || '',
          date: mr.exam_date || new Date().toISOString().slice(0,10),
        },

function openMapperForPatient(patientId) {
  App.mapRecord = { patient_id: patientId, isNew: true };
  switchTab('mapper');
}

async function openMapperForMap(mapId) {
  const maps = await dbGetAll('maps');
  const map = maps.find(m => m.id === mapId);
  if (map) { App.mapRecord = { ...map, isNew: false }; }
  switchTab('mapper');
}

function initMapper() {
  const wrap = $('mapper-wrap');
  const saveBtn = $('mapper-save-btn');
  if (!wrap) return;

  // Create the #app div that the mapper core needs
  wrap.innerHTML = '<div id="app"></div>';

  const mr = App.mapRecord;
  let initState = null;

  if (mr) {
    const patient = App.patient;
    initState = {
      patient: {
        name: patient?.owner_name || patient?.name || '',
        id:   patient?.patient_id || '',
        vet:  App.vet?.name || '',
        date: mr.exam_date || new Date().toISOString().slice(0,10),
      },
      species: mr.isNew
        ? (App.patient?.species === 'Feline' ? 'cat' : 'dog')
        : (mr.species === 'Feline' ? 'cat' : 'dog'),
      view:    mr.isNew ? 'lateral_right' : (mr.view || 'lateral_right'),
      lesions: mr.isNew ? [] : (mr.lesions || []),
      nextNum: mr.isNew ? 1 : Math.max(0, ...(mr.lesions||[]).map(l=>l.num||0)) + 1,
    };
    if (saveBtn) saveBtn.style.display = 'block';
  }

  // Initialise the mapper
  if (typeof initMapperExternal === 'function' && initState) {
    initMapperExternal(initState, () => {});
  } else if (typeof render === 'function') {
    // mapper-core uses global render()
    if (initState && typeof state !== 'undefined') {
      if (initState.patient) Object.assign(state.patient, initState.patient);
      if (initState.species) state.species = initState.species;
      if (initState.view)    state.view    = initState.view;
      if (initState.lesions) state.lesions = initState.lesions;
      if (initState.nextNum) state.nextNum = initState.nextNum;
      if (typeof settings !== 'undefined') settings.vet = App.vet?.name || '';
    }
    render();
  }

  const title = $('mapper-title');
  if (title && App.patient) title.textContent = `Mapper — ${App.patient.name}`;
}

async function saveCurrentMap() {
  const mr = App.mapRecord;
  if (!mr) { toast('No patient selected. Open a patient first.', true); return; }

  const ms = getMapperState();
  if (!ms) { toast('Mapper not ready — mark at least one lesion first.', true); return; }

  const mapData = {
    patient_id: mr.patient_id,
    vet_name:   App.vet?.name || '',
    exam_date:  ms.patient.date || new Date().toISOString().slice(0,10),
    species:    ms.species === 'cat' ? 'Feline' : 'Canine',
    view:       ms.view,
    lesions:    [...ms.lesions],
    created_at: mr.created_at || now(),
    updated_at: now(),
  };
  if (!mr.isNew && mr.id) mapData.id = mr.id;

  const newId = await dbPut('maps', mapData);
  App.mapRecord = { ...mapData, id: newId || mr.id, isNew: false };

  const patient = await dbGet('patients', mr.patient_id);
  if (patient) { patient.updated_at = now(); await dbPut('patients', patient); }

  toast('Map saved ✓');
}

    ${vets.map(v => `
      <div class="card-row">

async function addVet() {
  const name  = $('av-name').value.trim();
  const email = $('av-email').value.trim().toLowerCase();
  const pw    = $('av-pw').value;
  const err   = $('av-err');
  err.style.display = 'none';
  if (!name || !email || !pw) { err.textContent='All fields required.'; err.style.display='block'; return; }
  const vets = await dbGetAll('vets');
  if (vets.find(v => v.email === email)) { err.textContent='Email already exists.'; err.style.display='block'; return; }
  const hash = await hashPw(pw);
  await dbPut('vets', { name, email, pw_hash: hash, role: 'vet', created_at: now() });
  closeSheet();
  loadTeam();
  toast('Vet added ✓');
}

async function removeVet(id) {
  const vet = await dbGet('vets', id);
  if (!confirm(`Remove ${vet?.name || 'this vet'}? They will no longer be able to sign in.`)) return;
  await dbDelete('vets', id);
  loadTeam();
  toast('Vet removed');
}

async function changePassword() {
  const cur  = $('pw-cur').value;
  const nw   = $('pw-new').value;
  const con  = $('pw-con').value;
  const err  = $('pw-err');
  err.style.display = 'none';
  if (!cur || !nw) { err.textContent='All fields required.'; err.style.display='block'; return; }
  if (nw.length < 8) { err.textContent='New password must be at least 8 characters.'; err.style.display='block'; return; }
  if (nw !== con) { err.textContent='Passwords do not match.'; err.style.display='block'; return; }
  const curHash = await hashPw(cur);
  const vet = await dbGet('vets', App.vet.id);
  if (vet.pw_hash !== curHash) { err.textContent='Current password incorrect.'; err.style.display='block'; return; }
  vet.pw_hash = await hashPw(nw);
  await dbPut('vets', vet);
  $('pw-cur').value = ''; $('pw-new').value = ''; $('pw-con').value = '';
  toast('Password changed ✓');
}

async function exportData() {
  const patients = await dbGetAll('patients');
  const maps     = await dbGetAll('maps');
  const vets     = await dbGetAll('vets');
  const clinic   = await dbGet('settings', 'clinic');
  const data = { clinic, vets: vets.map(v=>({...v, pw_hash:undefined})), patients, maps, exported_at: now() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `lesionlog-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Backup downloaded ✓');
}

function signOut() {
  if (!confirm('Sign out?')) return;
  App.vet = null;
  App.screen = 'login';
  render();
}

// ── Bottom sheet ──────────────────────────────────────────────────────────────
function showSheet(title, bodyHtml) {
  let backdrop = $('sheet-backdrop');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.id = 'sheet-backdrop';
    backdrop.className = 'sheet-backdrop';
    backdrop.onclick = e => { if (e.target === backdrop) closeSheet(); };
    backdrop.innerHTML = `<div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-title" id="sheet-title"></div><div class="sheet-body" id="sheet-body"></div></div>`;
    document.body.appendChild(backdrop);
  }
  $('sheet-title').textContent = title;
  $('sheet-body').innerHTML = bodyHtml;
  backdrop.classList.add('open');
  setTimeout(() => { $('sheet').classList.add('open'); }, 10);
  // Focus first input
  setTimeout(() => { const inp = $('sheet-body').querySelector('input'); if (inp) inp.focus(); }, 300);
}

function closeSheet() {
  const sheet = $('sheet');
  const backdrop = $('sheet-backdrop');
  if (sheet) sheet.classList.remove('open');
  setTimeout(() => { if (backdrop) backdrop.classList.remove('open'); }, 300);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// ── Cloud Sync ────────────────────────────────────────────────────────────────
async function doSync() {
  const btn = document.getElementById('sync-btn');
  const status = document.getElementById('sync-status');
  if (btn) { btn.disabled = true; btn.textContent = 'Syncing…'; }
  try {
    const patients = await dbGetAll('patients');
    const maps     = await dbGetAll('maps');
    const vets     = await dbGetAll('vets');
    const clinic   = await dbGet('settings', 'clinic');

    // Ensure all records have sync_ids
    for (const p of patients) {
      if (!p.sync_id) { p.sync_id = LesionLogSync.generateUUID(); await dbPut('patients', p); }
    }
    for (const m of maps) {
      if (!m.sync_id) { m.sync_id = LesionLogSync.generateUUID(); await dbPut('maps', m); }
      const pat = patients.find(p => p.id === m.patient_id);
      if (pat) m.patient_sync_id = pat.sync_id;
    }
    for (const v of vets) {
      if (!v.sync_id) { v.sync_id = LesionLogSync.generateUUID(); await dbPut('vets', v); }
    }

    const result = await LesionLogSync.syncAll(
      { clinic, vets, patients, maps },
      msg => { if (status) status.textContent = msg; }
    );

    // Merge remote patients into local
    const allPats = await dbGetAll('patients');
    for (const rp of result.patients) {
      const local = allPats.find(p => p.sync_id === rp.id);
      const remoteUpdated = new Date(rp.updated_at).getTime();
      const localUpdated  = local ? new Date(local.updated_at || 0).getTime() : 0;
      if (!local || remoteUpdated > localUpdated) {
        await dbPut('patients', {
          ...(local || {}),
          id: local?.id,
          sync_id: rp.id,
          name: rp.name, species: rp.species,
          breed: rp.breed || '', owner_name: rp.owner_name || '',
          patient_id: rp.patient_id || '', dob: rp.dob || '',
          sex: rp.sex || '', notes: rp.notes || '',
          updated_at: rp.updated_at, created_at: rp.created_at,
        });
      }
    }

    // Merge remote maps
    const allMaps = await dbGetAll('maps');
    const allPats2 = await dbGetAll('patients');
    for (const rm of result.maps) {
      const local = allMaps.find(m => m.sync_id === rm.id);
      const remoteUpdated = new Date(rm.updated_at).getTime();
      const localUpdated  = local ? new Date(local.updated_at || 0).getTime() : 0;
      const pat = allPats2.find(p => p.sync_id === rm.patient_id);
      if ((!local || remoteUpdated > localUpdated) && pat) {
        await dbPut('maps', {
          ...(local || {}),
          id: local?.id,
          sync_id: rm.id,
          patient_id: pat.id,
          vet_name: rm.vet_name || '',
          exam_date: rm.exam_date,
          species: rm.species, view: rm.view,
          lesions: rm.lesions || [], notes: rm.notes || '',
          updated_at: rm.updated_at, created_at: rm.created_at,
        });
      }
    }

    const lastSync = new Date().toLocaleString();
    await dbPut('settings', { key: 'last_sync', value: lastSync });
    if (status) status.textContent = 'Last synced: ' + lastSync;
    if (btn) { btn.disabled = false; btn.textContent = '☁ Sync now'; }
    toast('Sync complete ✓');
    renderTab();
  } catch(e) {
    if (status) status.textContent = 'Sync failed: ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = '☁ Sync now'; }
    toast('Sync failed: ' + e.message, true);
  }
}

async function boot() {
  // Load CSS
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'app.css';
  document.head.appendChild(link);

  // Also load mapper CSS
  const mapperCss = document.createElement('link');
  mapperCss.rel = 'stylesheet';
  mapperCss.href = 'mapper-core.css';
  document.head.appendChild(mapperCss);

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Check if setup needed
  const vets = await dbGetAll('vets');
  const clinicSetting = await dbGet('settings', 'clinic');

  if (vets.length === 0) {
    App.screen = 'setup';
  } else {
    App.clinic = clinicSetting;
    App.screen = 'login';
  }

  render();
}

// Add mapper bridge for PWA context
window.addEventListener('load', () => {
  // Patch mapper's initMapperExternal if not defined
  if (typeof window.initMapperExternal === 'undefined') {
    window.initMapperExternal = function(initState, cb) {
      if (typeof state !== 'undefined') {
        if (initState.patient) Object.assign(state.patient, initState.patient);
        if (initState.species) state.species = initState.species;
        if (initState.view)    state.view    = initState.view;
        if (initState.lesions) state.lesions = initState.lesions;
        if (initState.nextNum) state.nextNum = initState.nextNum;
      }
      if (typeof settings !== 'undefined' && initState.patient) {
        settings.vet = initState.patient.vet || '';
      }
      if (typeof render === 'function') render();
      if (cb) cb(() => typeof state !== 'undefined' ? state : null);
    };
  }
  boot();
});
